<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Memory Manager</title>
</head>
<body>

<div class="app">
  <nav class="nav-sidebar">
    <div class="nav-logo" onclick="openInBrowser()" title="在浏览器中打开">M</div>
    <div class="nav-items">
      <button class="nav-item active" data-page="overview" onclick="loadPage('overview')">
        <span class="nav-label">总览</span>
      </button>
      <button class="nav-item" data-page="memory" onclick="loadPage('memory')">
        <span class="nav-label">记忆</span>
      </button>
      <button class="nav-item" data-page="steam" onclick="loadPage('steam')">
        <span class="nav-label">流</span>
      </button>
      <button class="nav-item" data-page="wiki" onclick="loadPage('wiki')">
        <span class="nav-label">Wiki</span>
      </button>

      <button class="nav-item" data-page="logs" onclick="loadPage('logs')">
        <span class="nav-label">日志</span>
      </button>
      <button class="nav-item" data-page="settings" onclick="loadPage('settings')">
        <span class="nav-label">设置</span>
      </button>
    </div>
  </nav>

  <main class="main-content">
    <div id="page-content"></div>
    <div class="statusbar">
      <div class="statusbar-item">
        <span id="sbModelText">模型加载中</span>
        <div class="statusbar-dot loading" id="sbModelDot"></div>
      </div>
      <div class="statusbar-item">
        <span>Qdrant</span>
        <div class="statusbar-dot ok" id="sbQdrantDot"></div>
      </div>
      <div class="statusbar-item">
        <span id="sbDeviceText">CPU</span>
      </div>
    </div>
  </main>
</div>

<!-- 全局控制台 -->
<div class="console-wrap" id="globalConsole">
  <div class="console-header">
    <div class="console-title">控制台</div>
    <div class="console-actions">
      <button class="btn-clear" onclick="clearConsole()">清空</button>
      <button class="btn-close" onclick="toggleConsole()">关闭</button>
    </div>
  </div>
  <div class="console-output" id="consoleOutput"></div>
  <div class="console-input-row">
    <span class="console-prompt">&gt;</span>
    <input type="text" id="consoleInput" class="console-input" placeholder="输入命令，按Enter执行" onkeydown="handleConsoleInput(event)">
  </div>
</div>
<div class="console-hint">按 ~ 打开控制台</div>

<style>
/* 控制台容器：固定在底部 */
.console-wrap {
  position: fixed;
  bottom: 28px;
  left: 80px;
  right: 0;
  height: 280px;
  background: #0f1117ee;
  border-top: 1px solid #2d3149;
  display: none;
  flex-direction: column;
  z-index: 500;
  backdrop-filter: blur(8px);
}
.console-wrap.show { display: flex; }

/* 头部 */
.console-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 8px 16px;
  border-bottom: 1px solid #2d3149;
  flex-shrink: 0;
}
.console-title { font-size: 12px; font-weight: 600; color: #a78bfa; }
.console-actions { display: flex; gap: 8px; }
.btn-clear, .btn-close {
  padding: 3px 10px;
  border: none;
  border-radius: 4px;
  font-size: 11px;
  cursor: pointer;
  transition: all .2s;
}
.btn-clear { background: #1e293b; color: #94a3b8; }
.btn-clear:hover { background: #263044; color: #e2e8f0; }
.btn-close { background: #ef444422; color: #fca5a5; }
.btn-close:hover { background: #ef444444; color: #fff; }

/* 输出区域 */
.console-output {
  flex: 1;
  overflow-y: auto;
  padding: 8px 16px;
  font-family: 'Consolas', monospace;
  font-size: 12px;
  line-height: 1.5;
}
.console-line { padding: 2px 0; border-bottom: 1px solid #12141c; }
.console-line:hover { background: #12141c; }
.con-line-info { color: #94a3b8; }
.con-line-warn { color: #fde047; }
.con-line-error { color: #fca5a5; }
.con-line-success { color: #86efac; }
.con-line-cmd { color: #a78bfa; }
.con-time { color: #64748b; margin-right: 8px; }

/* 输入行 */
.console-input-row {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 8px 16px;
  border-top: 1px solid #2d3149;
  flex-shrink: 0;
}
.console-prompt { color: #a78bfa; font-weight: 600; }
.console-input {
  flex: 1;
  background: transparent;
  border: none;
  color: #e2e8f0;
  font-size: 12px;
  font-family: 'Consolas', monospace;
  outline: none;
}
.console-input::placeholder { color: #475569; }

/* 全局控制台提示 */
.console-hint {
  position: fixed;
  bottom: 32px;
  right: 16px;
  font-size: 10px;
  color: #475569;
  background: #1a1d2788;
  padding: 3px 8px;
  border-radius: 4px;
  pointer-events: none;
  opacity: 0;
  transition: opacity .3s;
}
.console-hint.show { opacity: 1; }
</style>

<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Segoe UI', sans-serif;
  background: #0f1117;
  color: #e2e8f0;
  height: 100vh;
  overflow: hidden;
}
.app { display: flex; height: 100vh; }
.nav-sidebar {
  width: 80px;
  background: #1a1d27;
  border-right: 1px solid #2d3149;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 16px 0;
  flex-shrink: 0;
}
.nav-logo { font-size: 16px; font-weight: 700; color: #a78bfa; margin-bottom: 24px; cursor: pointer; border-radius: 8px; padding: 6px 4px; transition: background .2s; }
.nav-logo:hover { background: #7c3aed22; }
.nav-items { display: flex; flex-direction: column; gap: 6px; flex: 1; width: 100%; padding: 0 10px; }
.nav-item {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 4px;
  padding: 10px 4px;
  border: none;
  border-radius: 8px;
  background: transparent;
  color: #64748b;
  font-size: 11px;
  cursor: pointer;
  transition: all .2s;
  width: 100%;
}
.nav-item:hover { background: #1e293b; color: #94a3b8; }
.nav-item.active { background: #7c3aed22; color: #a78bfa; }
.nav-label { font-weight: 600; }
.main-content { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
#page-content { flex: 1; min-height: 0; overflow-y: auto; }
.statusbar { height: 28px; background: #1a1d27; border-top: 1px solid #2d3149; display: flex; align-items: center; justify-content: flex-end; gap: 16px; padding: 0 16px; font-size: 11px; color: #64748b; flex-shrink: 0; }
.statusbar-item { display: flex; align-items: center; gap: 5px; }
.statusbar-dot { width: 6px; height: 6px; border-radius: 50%; }
.statusbar-dot.ok { background: #22c55e; box-shadow: 0 0 4px #22c55e; animation: breathe 2s ease-in-out infinite; }
.statusbar-dot.err { background: #ef4444; box-shadow: 0 0 4px #ef4444; }
.statusbar-dot.loading { background: #eab308; box-shadow: 0 0 4px #eab308; animation: breathe 1s ease-in-out infinite; }

@keyframes breathe {
  0%, 100% { opacity: 1; transform: scale(1); box-shadow: 0 0 4px currentColor; }
  50% { opacity: 0.6; transform: scale(0.85); box-shadow: 0 0 2px currentColor; }
}
::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: #2d3149; border-radius: 2px; }
* { scrollbar-width: thin; scrollbar-color: #2d3149 transparent; }
.toast { position: fixed; bottom: 24px; right: 24px; background: #1a1d27; border: 1px solid #2d3149; border-radius: 10px; padding: 12px 18px; font-size: 13px; box-shadow: 0 8px 32px #0008; opacity: 0; transform: translateY(12px); transition: all .3s; pointer-events: none; z-index: 999; max-width: 300px; }
.toast.show { opacity: 1; transform: translateY(0); }
.toast.success { border-color: #22c55e44; color: #86efac; }
.toast.error { border-color: #ef444444; color: #fca5a5; }
</style>

<script src="core/lib/echarts.min.js"></script>
<script src="core/common.js"></script>
<script src="modules/router.js"></script>
<script src="core/console/console.js"></script>
<script src="console/index.js"></script>
<script src="index.js"></script>
</body>
</html>
