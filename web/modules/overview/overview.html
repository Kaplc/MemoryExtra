<style>
.overview-wrap { padding: 24px; flex: 1; display: flex; flex-direction: column; min-height: 0; overflow-y: auto; gap: 20px; box-sizing: border-box; }
.overview-title { font-size: 18px; font-weight: 700; }
.overview-row { display: flex; gap: 12px; flex-wrap: wrap; }

/* Status card */
.status-card { flex: 1; min-width: 160px; background: #1a1d27; border: 1px solid #2d3149; border-radius: 10px; padding: 16px 18px; display: flex; flex-direction: column; gap: 4px; align-items: flex-start; text-align: left; position: relative; }
.sc-label-row { display: flex; align-items: center; justify-content: space-between; width: 100%; }
.sc-label { font-size: 11px; color: #64748b; text-transform: uppercase; letter-spacing: .06em; font-weight: 600; }
.sc-value { font-size: 15px; font-weight: 700; color: #e2e8f0; }
.sc-badge { display: inline-block; padding: 2px 8px; border-radius: 99px; font-size: 11px; font-weight: 600; margin-left: 6px; }
.sc-badge.green { background: #22c55e22; color: #86efac; }
.sc-badge.red { background: #ef444422; color: #fca5a5; }
.sc-badge.yellow { background: #eab30822; color: #fde047; }
.sc-sub { font-size: 11px; color: #64748b; margin-top: 2px; }
.mini-loading { display: block; width: 24px; height: 24px; border: 2px solid #eab30844; border-top-color: #fde047; border-radius: 50%; animation: spin 0.8s linear infinite; margin: 12px auto; }
@keyframes spin { to { transform: rotate(360deg); } }

/* Chart section - merged with stats */
.chart-section { background: #1a1d27; border: 1px solid #2d3149; border-radius: 12px; padding: 20px; flex: 1; display: flex; flex-direction: column; gap: 16px; min-height: 0; }
.chart-header { display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 8px; }
.chart-title { font-size: 13px; font-weight: 600; color: #e2e8f0; }
.chart-legend { display: flex; gap: 12px; font-size: 11px; color: #64748b; }
.chart-legend span { display: flex; align-items: center; gap: 4px; }
.ldot { width: 8px; height: 8px; border-radius: 50%; }
.ldot.purple { background: #7c3aed; }
.ldot.green { background: #22c55e; }
.ldot.amber { background: #f59e0b; }
.chart-tabs { display: flex; gap: 2px; background: #12141c; border-radius: 8px; padding: 2px; }
.chart-tab { padding: 3px 10px; border-radius: 6px; font-size: 11px; color: #64748b; cursor: pointer; transition: all .2s; user-select: none; border: none; background: transparent; }
.chart-tab:hover { color: #94a3b8; }
.chart-tab.active { background: #7c3aed33; color: #a78bfa; font-weight: 600; }
/* 图表容器：固定宽度，不滚动 */
.chart-body { position: relative; height: 140px; width: 100%; display: flex; }
.chart-y-axis { width: 32px; flex-shrink: 0; display: flex; flex-direction: column; justify-content: space-between; align-items: flex-start; padding-left: 6px; font-size: 10px; color: #64748b; }
.chart-y-label { line-height: 1; }
.chart-svg-wrap { flex: 1; min-width: 0; height: 100%; position: relative; }
.chart-svg { width: 100%; height: 120px; }
.curve-line { fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
.curve-total { stroke: #7c3aed; }
.curve-added { stroke: #22c55e; }
.curve-updated { stroke: #f59e0b; }
.chart-x-labels { display: flex; justify-content: space-between; padding-top: 6px; width: 100%; overflow: hidden; }
.chart-x-label { font-size: 10px; color: #64748b; text-align: center; flex: 1; min-width: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

/* 图表端点悬浮窗 */
.chart-dot { cursor: pointer; transition: r .15s; }
.chart-dot:hover { r: 5; }
.chart-tooltip {
  position: absolute;
  background: #1e293b;
  border: 1px solid #475569;
  border-radius: 8px;
  padding: 10px 12px;
  font-size: 12px;
  color: #e2e8f0;
  pointer-events: none;
  z-index: 100;
  box-shadow: 0 4px 12px rgba(0,0,0,.4);
  min-width: 120px;
  opacity: 0;
  transition: opacity .15s;
}
.chart-tooltip.visible { opacity: 1; }
.tooltip-date { font-weight: 600; color: #a78bfa; margin-bottom: 6px; font-size: 11px; }
.tooltip-row { display: flex; justify-content: space-between; gap: 16px; margin: 3px 0; }
.tooltip-label { color: #94a3b8; }
.tooltip-val { font-weight: 600; }
.tooltip-val.purple { color: #a78bfa; }
.tooltip-val.green { color: #86efac; }
.tooltip-val.amber { color: #fde047; }

/* Stats inside chart section */
.chart-stats { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; padding-top: 16px; border-top: 1px solid #2d3149; }
.stat-box { text-align: center; }
.sb-value { font-size: 22px; font-weight: 700; color: #a78bfa; }
.sb-label { font-size: 11px; color: #64748b; margin-top: 4px; }
</style>

<div class="overview-wrap">
  <!-- Status indicators row -->
  <div class="overview-row">
    <div class="status-card" id="scModelCard">
      <div class="sc-label-row">
        <div class="sc-label" id="scModelLabel">模型状态</div>
        <span class="sc-badge" id="scModelBadge"></span>
      </div>
      <div class="sc-value" id="scModelValue"></div>
      <div class="sc-sub" id="scModelSub"></div>
    </div>
    <div class="status-card">
      <div class="sc-label-row">
        <div class="sc-label" id="scQdrantLabel">Qdrant 状态</div>
        <span class="sc-badge green" id="scQdrantBadge">OK</span>
      </div>
      <div class="sc-value" id="scQdrantValue"></div>
      <div class="sc-sub" id="scDimSub"></div>
      <div class="sc-sub" id="scQdrantHostSub"></div>
      <div class="sc-sub" id="scQdrantPortSub"></div>
      <div class="sc-sub" id="scQdrantCollectionSub"></div>
      <div class="sc-sub" id="scQdrantTopKSub"></div>
      <div class="sc-sub" id="scQdrantDiskSizeSub"></div>
    </div>
    <div class="status-card">
      <div class="sc-label">设备信息</div>
      <div class="sc-sub" id="scDeviceSub1"></div>
      <div class="sc-sub" id="scDeviceSub2"></div>
      <div class="sc-sub" id="scDeviceSub2b"></div>
      <div class="sc-sub" id="scDeviceSub3"></div>
      <div class="sc-sub" id="scDeviceSub4"></div>
      <div class="sc-sub" id="scDeviceSub5"></div>
      <div class="sc-sub" id="scDeviceSub6"></div>
    </div>
  </div>

  <!-- Memory chart -->
  <div class="chart-section">
    <div class="chart-header">
      <div class="chart-title">记忆趋势</div>
      <div style="display:flex;align-items:center;gap:12px">
        <div class="chart-legend">
          <span><i class="ldot purple"></i>累计</span>
          <span><i class="ldot green"></i>新增</span>
          
        </div>
        <div class="chart-tabs" id="chartTabs">
          <button class="chart-tab active" data-range="today">近24小时</button>
          <button class="chart-tab" data-range="week">7天</button>
          <button class="chart-tab" data-range="month">30天</button>
          <button class="chart-tab" data-range="all">全部</button>
        </div>
      </div>
    </div>
    <div class="chart-scroll-container" id="chartScrollContainer">
      <div id="chartContainer" style="width:100%;height:140px;"></div>
    </div>

    <!-- Stats row inside chart -->
    <div class="chart-stats">
      <div class="stat-box">
        <div class="sb-value" id="statTotal">-</div>
        <div class="sb-label">记忆总数</div>
      </div>
      <div class="stat-box">
        <div class="sb-value" id="statToday">-</div>
        <div class="sb-label">今日新增</div>
      </div>
    </div>
  </div>
</div>
