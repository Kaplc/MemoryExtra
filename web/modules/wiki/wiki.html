<style>
.wiki-wrap { padding: 24px; display: flex; flex-direction: column; gap: 16px; box-sizing: border-box; height: 100%; overflow: hidden; }
.wiki-title { font-size: 18px; font-weight: 700; }
.wiki-row { display: flex; gap: 12px; flex-wrap: wrap; }

/* Status card */
.wscard { flex: 1; min-width: 140px; background: #1a1d27; border: 1px solid #2d3149; border-radius: 10px; padding: 16px 18px; display: flex; flex-direction: column; gap: 4px; align-items: flex-start; text-align: left; }
.wsc-label { font-size: 11px; color: #64748b; text-transform: uppercase; letter-spacing: .06em; font-weight: 600; }
.wsc-value { font-size: 22px; font-weight: 700; color: #e2e8f0; }
.wsc-sub { font-size: 11px; color: #64748b; margin-top: 2px; }

/* Action bar */
.action-bar { display: flex; align-items: center; gap: 10px; }
.btn-action {
  padding: 8px 18px; border-radius: 8px; font-size: 13px; font-weight: 600;
  cursor: pointer; transition: all .2s; border: none; user-select: none;
}
.btn-primary { background: #7c3aed33; color: #a78bfa; border: 1px solid #7c3aed44; }
.btn-primary:hover { background: #7c3aed44; color: #c4b5fd; }
.btn-secondary { background: #1e293b; color: #94a3b8; border: 1px solid #2d3149; }
.btn-secondary:hover { background: #263044; color: #cbd5e1; }
.btn-primary:disabled, .btn-secondary:disabled { opacity: 0.4; cursor: not-allowed; }

/* Index result */
.index-result { font-size: 12px; padding: 10px 14px; border-radius: 8px; line-height: 1.6; }
.index-result.ok { background: #22c55e11; color: #86efac; border: 1px solid #22c55e22; }
.index-result.err { background: #ef444411; color: #fca5a5; border: 1px solid #ef444422; }

/* Tab bar */
.tab-bar { display: flex; gap: 0; background: #12141c; border-radius: 8px; padding: 2px; width: fit-content; }
.tab-btn {
  padding: 6px 20px; border-radius: 6px; font-size: 12px; font-weight: 600;
  cursor: pointer; transition: all .15s; user-select: none;
  border: none; background: transparent; color: #64748b;
}
.tab-btn:hover { color: #94a3b8; }
.tab-btn.active { background: #7c3aed33; color: #a78bfa; }

/* Content area (tab panel) */
.content-area { flex: 1; min-height: 0; display: flex; flex-direction: column; overflow: hidden; }
.tab-panel { display: none; flex: 1; flex-direction: column; min-height: 0; overflow: hidden; }
.tab-panel.active { display: flex; }

/* File table section */
.file-section { background: #1a1d27; border: 1px solid #2d3149; border-radius: 12px; padding: 20px; display: flex; flex-direction: column; gap: 12px; flex: 1; min-height: 0; }
.fs-header { display: flex; align-items: center; justify-content: space-between; flex-shrink: 0; }
.fs-title { font-size: 13px; font-weight: 600; color: #e2e8f0; }
.table-wrap { flex: 1; min-height: 0; overflow-y: auto; }
.file-table { width: 100%; border-collapse: collapse; font-size: 13px; }
.file-table th {
  position: sticky; top: 0; z-index: 1;
  background: #12141c; color: #64748b; font-size: 11px; font-weight: 600;
  text-align: left; padding: 8px 12px; border-bottom: 1px solid #2d3149; white-space: nowrap;
  cursor: pointer; user-select: none;
}
.file-table th:hover { color: #94a3b8; }
.file-table td { padding: 8px 12px; border-bottom: 1px solid #1a1d27; vertical-align: top; }
.file-table tr:hover td { background: #12141c; }
.ft-name { color: #a78bfa; font-weight: 500; word-break: break-all; }
.ft-meta { color: #64748b; white-space: nowrap; font-size: 12px; }
.ft-preview { color: #94a3b8; max-width: 400px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; font-size: 12px; }

/* Log section */
.log-section { background: #1a1d27; border: 1px solid #2d3149; border-radius: 12px; padding: 20px; display: flex; flex-direction: column; gap: 12px; flex: 1; min-height: 0; }
.log-header { display: flex; align-items: center; justify-content: space-between; flex-shrink: 0; }
.log-title { font-size: 13px; font-weight: 600; color: #e2e8f0; }
.log-wrap { flex: 1; min-height: 0; overflow-y: auto; font-size: 11px; line-height: 1.6; font-family: 'Consolas', monospace; }
.log-line { color: #94a3b8; white-space: pre-wrap; word-break: break-all; border-bottom: 1px solid #12141c; padding: 2px 4px; }
.log-line:hover { background: #12141c; }
.log-time { color: #64748b; }
.log-level-info { color: #86efac; }
.log-level-warn { color: #fde047; }
.log-level-error { color: #fca5a5; }

/* Loading spinner */
.mini-loading { display: block; width: 24px; height: 24px; border: 2px solid #eab30844; border-top-color: #fde047; border-radius: 50%; animation: spin 0.8s linear infinite; margin: 24px auto; }
@keyframes spin { to { transform: rotate(360deg); } }

/* Copy toast */
.copy-toast {
  position: fixed; top: 36px; left: 50%; transform: translateX(-50%);
  background: #22c55e22; color: #86efac; border: 1px solid #22c55e44;
  font-size: 11px; padding: 4px 16px; border-radius: 6px; pointer-events: none;
  z-index: 100; animation: fadeInOut 1.2s ease forwards;
}
@keyframes fadeInOut { 0%{opacity:0;transform:translateX(-50%) translateY(-12px)} 15%{opacity:1;transform:translateX(-50%) translateY(0)} 85%{opacity:1;transform:translateX(-50%) translateY(0)} 100%{opacity:0;transform:translateX(-50%) translateY(12px)} }
/* File table row cursor */
.file-table tbody tr:hover { background: #12141c; }

/* Empty state */
.empty-state { text-align: center; color: #64748b; padding: 40px 20px; font-size: 13px; }
</style>

<div class="wiki-wrap">
  <div class="wiki-title">Wiki 知识库</div>

  <!-- Stats cards -->
  <div class="wiki-row">
    <div class="wscard">
      <div class="wsc-label">文件数</div>
      <div class="wsc-value" id="wikiFileCount">-</div>
    </div>
    <div class="wscard">
      <div class="wsc-label">总大小</div>
      <div class="wsc-value" id="wikiTotalSize">-</div>
      <div class="wsc-sub" id="wikiSizeSub"></div>
    </div>
    <div class="wscard">
      <div class="wsc-label">状态</div>
      <div class="wsc-value" id="wikiStatus" style="font-size:15px;color:#86efac">就绪</div>
    </div>
  </div>

  <!-- Actions -->
  <div class="action-bar">
    <button class="btn-action btn-primary" id="btnReindex" onclick="rebuildIndex()">重建索引</button>
    <button class="btn-action btn-secondary" onclick="loadWikiData()">刷新数据</button>
  </div>
  <div id="indexResult"></div>

  <!-- Tab bar -->
  <div class="tab-bar">
    <button class="tab-btn active" data-tab="files" onclick="switchTab('files')">文件列表</button>
    <button class="tab-btn" data-tab="log" onclick="switchTab('log')">日志</button>
  </div>

  <!-- Tab panels -->
  <div class="content-area">
    <!-- Files tab -->
    <div class="tab-panel active" id="panelFiles">
      <div class="file-section">
        <div class="fs-header">
          <div class="fs-title">文件列表</div>
          <span class="ft-meta" id="wikiFileListMeta"></span>
        </div>
        <div class="table-wrap">
          <div id="wikiTableWrap"><div class="mini-loading"></div></div>
        </div>
      </div>
    </div>

    <!-- Log tab -->
    <div class="tab-panel" id="panelLog">
      <div class="log-section">
        <div class="log-header">
          <div class="log-title">Wiki / RAG 日志</div>
          <span class="ft-meta" id="wikiLogMeta"></span>
          <button class="btn-action btn-secondary" style="padding:4px 12px;font-size:11px" onclick="loadLog()">刷新日志</button>
        </div>
        <div class="log-wrap" id="wikiLogWrap">
          <div class="empty-state">点击「刷新日志」加载</div>
        </div>
      </div>
    </div>
  </div>
</div>
