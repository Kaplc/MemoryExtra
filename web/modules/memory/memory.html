<div class="memory-layout">
  <!-- 顶部导航栏 -->
  <nav class="memory-nav">
    <div class="nav-tabs">
      <button class="nav-tab active" data-tab="search" onclick="switchTab('search')">搜索记忆</button>
      <button class="nav-tab" data-tab="store" onclick="switchTab('store')">保存记忆</button>
      <button class="nav-tab" data-tab="organize" onclick="switchTab('organize')">整理记忆</button>
    </div>
    <div class="nav-stat">
      <span class="stat-value" id="totalCount">-</span>
      <span class="stat-label">条记忆</span>
      <button class="btn-icon" onclick="loadAll()" title="刷新">↻</button>
    </div>
  </nav>

  <!-- 搜索面板 -->
  <div id="tabSearch" class="tab-panel">
    <div class="search-bar">
      <input id="searchInput" type="text" placeholder="搜索相关记忆..." oninput="debounceSearch()">
      <button class="btn btn-primary" onclick="searchMemory()">搜索</button>
      <div class="search-history-wrap">
        <button class="btn-icon" onclick="toggleSearchHistory()" title="搜索历史">🕐</button>
        <div id="searchHistoryDropdown" class="sh-dropdown" style="display:none">
          <div class="sh-dropdown-header"><span>搜索历史</span><button class="sh-clear" onclick="clearSearchHistory()">清空</button></div>
          <div id="searchHistory" class="sh-dropdown-list"></div>
        </div>
      </div>
    </div>
    <div class="memory-list-container">
      <div class="memory-list" id="memoryList">
        <div class="empty">
          <div class="empty-icon">🔍</div>
          <div class="empty-text">搜索记忆以查看结果</div>
        </div>
      </div>
    </div>
  </div>

  <!-- 保存面板 -->
  <div id="tabStore" class="tab-panel" style="display:none">
    <div class="store-area">
      <textarea id="storeInput" placeholder="输入要记住的内容..."></textarea>
      <button class="btn btn-primary" onclick="storeMemory()">保存记忆</button>
    </div>
    <div class="memory-list-container">
      <div class="memory-list" id="allMemoryList"></div>
    </div>
  </div>

  <!-- 整理面板 -->
  <div id="tabOrganize" class="tab-panel" style="display:none">
    <div class="organize-toolbar">
      <select id="dedupThreshold" class="organize-select">
        <option value="0.90">严格去重</option>
        <option value="0.85" selected>中等去重</option>
        <option value="0.80">宽松去重</option>
      </select>
      <button class="btn btn-accent" id="organizeBtn" onclick="startOrganize()">开始分析</button>
    </div>
    <div class="memory-list-container">
      <div id="organizeContent">
        <div class="empty">
          <div class="empty-icon">🧹</div>
          <div class="empty-text">点击"开始分析"扫描重复记忆</div>
        </div>
      </div>
    </div>
  </div>
</div>

<style>
