<style>
.steam-wrap { padding: 24px; flex: 1; display: flex; flex-direction: column; min-height: 0; overflow: hidden; gap: 16px; box-sizing: border-box; height: 100%; }
.steam-header { display: flex; align-items: center; justify-content: space-between; flex-shrink: 0; }
.steam-title { font-size: 16px; font-weight: 700; color: #e2e8f0; }
.steam-count { font-size: 12px; color: #64748b; }

/* 两栏布局 */
.steam-columns { display: flex; gap: 16px; flex: 1; min-height: 0; overflow: hidden; }
.steam-column { flex: 1; display: flex; flex-direction: column; gap: 12px; min-width: 0; overflow: hidden; height: 100%; }
.steam-column-header { display: flex; align-items: center; gap: 8px; font-size: 13px; font-weight: 600; color: #94a3b8; padding-bottom: 8px; border-bottom: 1px solid #2d3149; }
.steam-column-dot { width: 8px; height: 8px; border-radius: 50%; }
.steam-column-dot.store { background: #22c55e; box-shadow: 0 0 6px #22c55e66; }
.steam-column-dot.search { background: #3b82f6; box-shadow: 0 0 6px #3b82f666; }
.steam-column-count { margin-left: auto; font-size: 11px; color: #64748b; font-weight: 400; }

.steam-list { display: flex; flex-direction: column; gap: 6px; overflow-y: auto; flex: 1; min-height: 0; height: 100%; }

.steam-item {
  display: flex; align-items: center; gap: 10px;
  background: #1a1d27; border: 1px solid #2d3149; border-radius: 8px;
  padding: 10px 14px; font-size: 12px; color: #94a3b8;
}
.steam-item.new {
  animation: slideIn 0.3s ease-out both;
}
@keyframes slideIn {
  from { opacity: 0; transform: translateY(-12px); max-height: 0; padding-top: 0; padding-bottom: 0; border-width: 0; margin-bottom: -6px; }
  to   { opacity: 1; transform: translateY(0); max-height: 80px; padding-top: 10px; padding-bottom: 10px; border-width: 1px; margin-bottom: 6px; }
}

.steam-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
.steam-dot.store { background: #22c55e; box-shadow: 0 0 6px #22c55e66; }
.steam-dot.search { background: #3b82f6; box-shadow: 0 0 6px #3b82f666; }
.steam-dot.delete { background: #ef4444; box-shadow: 0 0 6px #ef444466; }

.steam-body { flex: 1; min-width: 0; overflow: hidden; }
.steam-text { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; color: #cbd5e1; }
.steam-time { font-size: 10px; color: #475569; white-space: nowrap; flex-shrink: 0; }
.steam-empty { text-align: center; color: #475569; padding: 40px 0; font-size: 13px; }
</style>

<div class="steam-wrap">
  <div class="steam-header">
    <div class="steam-title">记忆流</div>
    <div class="steam-count" id="streamCount">共 0 条</div>
  </div>

  <div class="steam-columns">
    <!-- 左侧：写入操作 -->
    <div class="steam-column">
      <div class="steam-column-header">
        <div class="steam-column-dot store"></div>
        <span>写入记忆</span>
        <span class="steam-column-count" id="storeCount">0 条</span>
      </div>
      <div class="steam-list" id="storeList">
        <div class="steam-empty">暂无写入记录</div>
      </div>
    </div>

    <!-- 右侧：查询操作 -->
    <div class="steam-column">
      <div class="steam-column-header">
        <div class="steam-column-dot search"></div>
        <span>查询记忆</span>
        <span class="steam-column-count" id="searchCount">0 条</span>
      </div>
      <div class="steam-list" id="searchList">
        <div class="steam-empty">暂无查询记录</div>
      </div>
    </div>
  </div>
</div>
